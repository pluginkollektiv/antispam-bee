name: Tests, Coding Standards
on: push
jobs:
  test-unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-versions: ['8.3', '7.4']
    steps:
    - uses: actions/checkout@v7
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-versions }}
        extensions: mbstring, intl
        ini-values: post_max_size=256M, short_open_tag=On
        tools: composer
    - name: Install
      run: |
        composer install
    - name: Run tests
      run: |
        composer test:unit

  test-e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.5'
            wordpress: 'nightly'
          - php: '8.5'
            wordpress: 'latest'
          - php: '8.5'
            wordpress: '7.0'
          - php: '8.4'
            wordpress: '6.9'
          - php: '8.3'
            wordpress: '6.8'
          - php: '8.2'
            wordpress: '6.7'
          - php: '8.1'
            wordpress: '6.6'
          - php: '8.0'
            wordpress: '6.0'
          - php: '7.4'
            wordpress: '5.6'
    steps:
    - uses: actions/checkout@v7
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'
    - name: Install npm dependencies
      run: npm ci
    - name: Install Playwright browsers
      run: npx playwright install chromium --with-deps
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php }}
        tools: composer
    - name: Install Composer dependencies
      run: composer install --no-dev --optimize-autoloader
    - name: Configure wp-env for matrix
      run: |
        case "${{ matrix.wordpress }}" in
          nightly) CORE="WordPress/WordPress" ;;
          latest)  CORE="https://wordpress.org/latest.zip" ;;
          *)       CORE="https://wordpress.org/wordpress-${{ matrix.wordpress }}.zip" ;;
        esac
        echo "{\"core\":\"${CORE}\",\"phpVersion\":\"${{ matrix.php }}\"}" | tee .wp-env.override.json
    - name: Start wp-env
      run: npm run env:start
    - name: Run E2E tests
      run: npm run test:e2e
    - name: Upload test report on failure
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: playwright-report-php${{ matrix.php }}-wp${{ matrix.wordpress }}
        path: tests/e2e/report/
        retention-days: 7
    - name: Stop wp-env
      if: always()
      run: npm run env:stop

  quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        tools: composer
    - name: Run code style checks for CSS, JavaScript and PHP
      run: |
        composer install --ignore-platform-req=php
        ./vendor/bin/phpcs --config-set ignore_warnings_on_exit 1
        composer cs
